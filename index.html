<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
  <div class="nav-logo">📸 PhotoGallery</div>
</nav>

<!-- Header -->
<header>
  <h1> 📸 Welcome to Photo Gallery</h1>
  <p>Explore stunning visuals across categories</p>
</header>

<!-- Search Bar -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Search by name or category..." autocomplete="off" />
</div>

<!-- Filter Bar -->
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">📸 All</button>
  <button class="filter-btn" data-filter="nature">🌿 Nature</button>
  <button class="filter-btn" data-filter="animals">🐾 Animals</button>
  <button class="filter-btn" data-filter="cars">🚘 Cars</button>
  <button class="filter-btn" data-filter="city">🏙️ City</button>
  <button class="filter-btn" data-filter="favorites">❤️ Favorites</button>
  <button class="filter-btn" data-filter="technology">💻 Technology</button>
</div>

<!-- Gallery -->
<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lightbox-inner">
    <div class="lightbox-img-wrap" id="lbImgWrap">
      <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
      <div class="lb-slide-track" id="lbTrack"></div>
      <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#8592;</button>
      <button class="lb-nav lb-next" id="lbNext" aria-label="Next">&#8594;</button>
    </div>
    <div class="lightbox-caption">
      <h3 id="lbTitle"></h3>
      <span id="lbCategory"></span>
    </div>
    <div class="lb-counter" id="lbCounter"></div>
    <div class="lb-actions">
      <button class="lb-action-btn" id="lbFav">🤍 Favorite</button>
      <a class="lb-action-btn" id="lbDownload" download>⬇️ Download</a>
    </div>
    <div class="lb-filters" id="lbFilters">
      <button class="lb-filter-btn active" data-css-filter="none">Original</button>
      <button class="lb-filter-btn" data-css-filter="grayscale(100%)">B&amp;W</button>
      <button class="lb-filter-btn" data-css-filter="sepia(80%)">Sepia</button>
      <button class="lb-filter-btn" data-css-filter="saturate(200%) hue-rotate(30deg)">Vivid</button>
      <button class="lb-filter-btn" data-css-filter="invert(100%)">Invert</button>
      <button class="lb-filter-btn" data-css-filter="contrast(150%) brightness(1.1)">Contrast</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
